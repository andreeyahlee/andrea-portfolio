<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Andrea Lee — UX Designer</title>
  <meta name="description" content="Andrea Lee, UX Designer. Making complex things stupidly simple.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@1,300&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:           #F6F6F4;
      --ink:          #0A0A0A;
      --muted:        #8A8A86;
      --accent:       #A64A2E;
      --arvo:         #2a4a6b;
      --seletar:      #2b5e3a;
      --pethaus:      #7b3f6e;
      --font-display: 'Fraunces', serif;
      --font-body:    'Inter', sans-serif;
      --sp-xs:  8px;
      --sp-sm:  16px;
      --sp-md:  32px;
      --sp-lg:  64px;
      --sp-xl:  128px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--ink);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; }
    img { display: block; max-width: 100%; }
    button { cursor: pointer; border: none; font-family: inherit; background: none; }

    /* ── NAV ── */
    .nav {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 20px;
      background: var(--ink);
      border-radius: 100px;
      padding: 10px 10px 10px 16px;
      white-space: nowrap;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      color: var(--bg);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .nav-link {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      color: rgba(246, 246, 244, 0.70);
    }
    .nav-link:hover { color: var(--bg); }

    .nav-cta {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      color: var(--bg);
      border: 1.5px solid rgba(246, 246, 244, 0.45);
      border-radius: 100px;
      padding: 7px 18px;
    }
    .nav-cta:hover { border-color: var(--bg); }

    /* ── HERO ── */
    #hero {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #hero-img {
      width: 60vw;
      max-width: 860px;
      height: auto;
      object-fit: contain;
      flex-shrink: 0;
    }

    /* ── Scroll indicator ── */
    .hero-scroll {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      pointer-events: none;
    }

    .hero-scroll-line {
      display: block;
      width: 1px;
      height: 40px;
      background: var(--muted);
    }

    .hero-scroll-text {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.01em;
    }

    .hero-scroll-text em {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 300;
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav" id="nav" role="navigation" aria-label="Main navigation">
    <a href="#hero" class="nav-logo" aria-label="Home">
      <svg width="20" height="24" viewBox="0 0 20 24" fill="none" aria-hidden="true">
        <circle cx="10" cy="9" r="2.8" fill="currentColor"/>
        <ellipse cx="10" cy="3"   rx="2"   ry="3.5" fill="currentColor" opacity="0.8"/>
        <ellipse cx="16.5" cy="9" rx="3.5" ry="2"   fill="currentColor" opacity="0.8"/>
        <ellipse cx="10" cy="15"  rx="2"   ry="3.5" fill="currentColor" opacity="0.8"/>
        <ellipse cx="3.5"  cy="9" rx="3.5" ry="2"   fill="currentColor" opacity="0.8"/>
        <path d="M10 12 C10 16 8.5 20 7.5 24" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" fill="none"/>
        <path d="M9.5 18.5 C7.5 17 5.5 17.5 5 18.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" fill="none"/>
      </svg>
    </a>

    <div class="nav-links">
      <a class="nav-link" href="#work">Work</a>
      <a class="nav-link" href="#about">About</a>
    </div>

    <button class="nav-cta" id="nav-sayhi">Say Hi!</button>
  </nav>


  <!-- HERO -->
  <section id="hero">

    <img
      id="hero-img"
      src="assets.webp/hero-initial.png"
      alt="Andrea Lee's workspace: a mid-century desk with monitor, lamp, plants and design objects"
      fetchpriority="high"
      width="860"
      height="648"
    >

    <div class="hero-scroll" aria-hidden="true">
      <span class="hero-scroll-line"></span>
      <span class="hero-scroll-text"><em>scroll</em> down</span>
    </div>

  </section>

</body>
</html>
